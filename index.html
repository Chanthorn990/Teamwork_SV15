<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Form Login</title>
    <link rel="stylesheet" href="boostrap.css" />
  </head>
  <style>
    .form_box {
      background-color: whitesmoke;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 1px 0px 13px 8px #ccc;
    }
  </style>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-lg-4 col-md-4 col-sm-12 mt-3">
          <div class="form_box">
            <form method="get" action="#">
              <!-- Name -->
              <div class="form-group">
                <label for="name">Name</label>
                <input type="text" class="form-control" id="name" />
              </div>
              <!-- Gender -->
              <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" class="form-control">
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                  <option value="none">None</option>
                </select>
              </div>
              <!-- Age -->
              <div class="form-group">
                <label for="age">Age</label>
                <input
                  min="18"
                  max="85"
                  type="number"
                  class="form-control"
                  id="age"
                />
              </div>
              <!-- Email -->
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" class="form-control" id="email" />
              </div>
              <!-- Profile URL -->
              <div class="form-group">
                <label for="profile_url">Profile URL</label>
                <input type="url" class="form-control" id="profile_url" />
              </div>
              <!-- Buttons -->
              <div class="form-group">
                <input
                  type="button"
                  class="btn btn-primary float-right"
                  value="Save"
                  id="btn_save"
                />
                <input
                  type="button"
                  class="btn btn-danger"
                  value="Cancel"
                  id="btn_cancel"
                />
              </div>
            </form>
          </div>
        </div>
        <div class="col-8 col-md-8 col-sm-12 mt-3">
          <div class="table-responsive">
            <table id="user_table" class="table table-borderless table-striped">
              <thead>
                <tr class="bg-primary text-white">
                  <th>#</th>
                  <th>Name</th>
                  <th>Gender</th>
                  <th>Age</th>
                  <th>Email</th>
                  <th>Profile</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="./Sweet.js"></script>

  <script>
    let input_name = document.getElementById("name");
    let input_gender = document.getElementById("gender");
    let input_age = document.getElementById("age");
    let input_email = document.getElementById("email");
    let input_profile_url = document.getElementById("profile_url");
    let btn_save = document.getElementById("btn_save");
    let btn_cancel = document.getElementById("btn_cancel");
    let user_table = document.querySelector("#user_table tbody");
    let edit_index = null;
    let user_list = [];

    btn_save.addEventListener("click", function () {
      Swal.fire({
        title: "success",
        icon: "success",
        draggable: true,
      });
      let name = input_name.value.trim();
      let gender = input_gender.value;
      let age = input_age.value.trim();
      let email = input_email.value.trim();
      let profile_url = input_profile_url.value.trim();

      if (name == null || name.trim() == "") {
        Swal.fire({
          title: "Field Error",
          text: "Name field cannot be empty",
          icon: "error",
        });
        return;
      }

      if (age == null || age.trim() == "") {
        Swal.fire({
          title: "Age Error",
          text: "Age field cannot be empty",
          icon: "error",
        });
        return;
      }

      if (parseInt(age) > 85 || parseInt(age) < 18) {
        Swal.fire({
          title: "Age Error",
          text: "Age must be between 18 to 85 !!",
          icon: "error",
        });
        return;
      }

      if (email == null || email.trim() == "") {
        Swal.fire({
          title: "Email Error",
          text: "Email field cannot be empty",
          icon: "error",
        });
        return;
      }
      
      if (profile_url == null || profile_url == null) {
        Swal.fire({
          title: "Profile URL Error",
          text: "Profile URL field cannot be empty",
          icon: "error",
        });
        return;
      }

      
      if (edit_index !== null) {
        user_list[edit_index] = { name, gender, age, email, profile_url };
        edit_index = null;
        btn_save.value = "Save";
      } else {
        user_list.push({ name, gender, age, email, profile_url });
      }

      renderTable();
      clearForm();
    });

    function renderTable() {
      user_table.innerHTML = "";
      let index = 0;
      for (let item of user_list) {
        index++;
        let new_tr = document.createElement("tr");
        new_tr.innerHTML = `
          <td>${index}</td>
          <td>${item.name}</td>
          <td>${item.gender}</td>
          <td>${item.age}</td>
          <td>${item.email}</td>
          
          <td>
            <img src="${ item.profile_url }" 
            alt="Profile" style="width: 50px; height: 50px; border-radius: 50%;">
          </td>

          <td>
            <input onclick="editUser(${ index - 1 })" type="button" value="Edit" class="btn btn-sm btn-warning">
            <input onclick="deleteUser(${ index - 1})" type="button" value="Delete" class="btn btn-sm btn-danger">
          </td>`;
        user_table.appendChild(new_tr);
      }
    }

    function clearForm() {
      input_name.value = "";
      input_gender.value = "male";
      input_age.value = "";
      input_email.value = "";
      input_profile_url.value = "";
      edit_index = null;
      btn_save.value = "Save";
    }

    function deleteUser(index) {
      Swal.fire({
        title: "Are you sure?",
        text: "You won't be able to revert this!",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#3085d6",
        cancelButtonColor: "#d33",
        confirmButtonText: "Yes, delete it!",
      }).then((result) => {
        if (result.isConfirmed) {
          user_list.splice(index, 1);
          renderTable();
        }
      });
    }

    function editUser(index) {
      let user = user_list[index];
      input_name.value = user.name;
      input_gender.value = user.gender;
      input_age.value = user.age;
      input_email.value = user.email;
      input_profile_url.value = user.profile_url;
      edit_index = index;
      btn_save.value = "Edit";
    }

    btn_cancel.addEventListener("click", function () {
      Swal.fire({
        title: "Are you sure?",
        text: "Do you want to cancel?",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#3085d6",
        cancelButtonColor: "#d33",
        confirmButtonText: "Yes, I do!",
      }).then((result) => {
        if (result.isConfirmed) {
          clearForm();
        }
      });
    });
  </script>
</html>
